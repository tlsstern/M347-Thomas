#cloud-config
# source: https://gist.github.com/syntaqx/9dd3ff11fb3d48b032c84f3e31af9163
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  teacher
ssh_pwauth: false
disable_root: false
package_update: true
package_upgrade: true
groups:
  - docker
system_info:
  default_user:
    groups: [docker]
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unattended-upgrades
final_message: "The system is finally up, after $UPTIME seconds"
write_files:
  - path: /home/ubuntu/app/docker-compose.yaml
    content: |
      version: '3.8'

      services:
        web:
          build: .
          container_name: m347-kn04a-web
          ports:
            - "80:80"
          depends_on:
            - db
          networks:
            kn04-network:

        db:
          image: mariadb:latest
          container_name: m347-kn04a-db
          environment:
            MYSQL_ROOT_PASSWORD: secretroot
            MYSQL_DATABASE: kn02
          networks:
            kn04-network:

      networks:
        kn04-network:
          driver: bridge
          ipam:
            config:
              - subnet: 172.10.0.0/16
                ip_range: 172.10.5.0/24
                gateway: 172.10.5.254

  - path: /home/ubuntu/app/Dockerfile
    content: |
      FROM php:8.0-apache

      RUN docker-php-ext-install mysqli

      COPY info.php /var/www/html/
      COPY db.php /var/www/html/

      EXPOSE 80

  - path: /home/ubuntu/app/info.php
    content: |
      <?php
      phpinfo();
      ?>

  - path: /home/ubuntu/app/db.php
    content: |
      <?php
              //database
              $servername = "m347-kn04a-db";
              $username = "root";
              $password = "secretroot";
              $dbname = "kn02";

              // Create connection
              $conn = new mysqli($servername, $username, $password, $dbname);
              // Check connection
              if ($conn->connect_error) {
                      die("Connection failed: " . $conn->connect_error);
              }

              $sql = "select Host, User from mysql.user;";
              $result = $conn->query($sql);
              while($row = $result->fetch_assoc()){
                      echo($row["Host"] . " / " . $row["User"] . "<br />");
              }
      ?>

runcmd:
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - chown -R ubuntu:ubuntu /home/ubuntu/app
  - cd /home/ubuntu/app && docker compose up -d --build
