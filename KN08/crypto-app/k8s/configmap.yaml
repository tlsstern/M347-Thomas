apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  REACT_APP_ACCOUNT_HOLDINGS: "/Account/Cryptos?userId=<userId>"
  REACT_APP_ACCOUNT_FRIENDS: "/Account/Friends?userId=<userId>"
  REACT_APP_BUYSELL_BUY: "/buy"
  REACT_APP_BUYSELL_SELL: "/sell"
  REACT_APP_SENDRECEIVE_SEND: "/send"
  REACT_APP_USER_LOGGED_IN: "1"
  ACCOUNT_URL: "http://account:8080"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-sql
data:
  init.sql: |
    SET time_zone = "+00:00";
    CREATE TABLE IF NOT EXISTS `users` (
      `id` int NOT NULL,
      `name` varchar(50) NOT NULL,
      `amount` int not null
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb3 COLLATE=utf8mb3_general_ci;
    CREATE TABLE IF NOT EXISTS `friends` (
      `user_id1` int NOT NULL,
      `user_id2` int NOT NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb3 COLLATE=utf8mb3_general_ci;
    CREATE TABLE IF NOT EXISTS `cryptos` (
      `userId` int NOT NULL,
      `amount` int NOT NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb3 COLLATE=utf8mb3_general_ci;
    ALTER TABLE `users` ADD PRIMARY KEY (`id`);
    ALTER TABLE `friends` ADD PRIMARY KEY (`user_id1`, `user_id2`);
    ALTER TABLE `cryptos` ADD PRIMARY KEY (`userId`);
    INSERT IGNORE INTO users (id, name, amount) values (1, 'Rene', 30);
    INSERT IGNORE INTO users (id, name, amount) values (2, 'Sam', 87);
    INSERT IGNORE INTO users (id, name, amount) values (3, 'Sara', 54);
    INSERT IGNORE INTO users (id, name, amount) values (4, 'Yannis', 54);
    INSERT IGNORE INTO users (id, name, amount) values (5, 'Sabrina', 22);
    INSERT IGNORE INTO cryptos (userId, amount) values (1, 100);
    INSERT IGNORE INTO cryptos (userId, amount) values (2, 200);
    INSERT IGNORE INTO cryptos (userId, amount) values (3, 300);
    INSERT IGNORE INTO cryptos (userId, amount) values (4, 400);
    INSERT IGNORE INTO cryptos (userId, amount) values (5, 500);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (1, 3);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (1, 5);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (1, 4);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (3,2);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (3,4);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (5,2);
    INSERT IGNORE INTO friends(user_id1, user_id2) values (5,4);

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      include mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      server {
        listen 80;
        location / {
          root /usr/share/nginx/html;
          index index.html index.htm;
          try_files $uri $uri/ /index.html;
        }
        location /Account/ {
          proxy_pass http://account:8080/Account/;
        }
        location /buy {
          proxy_pass http://buysell:3001/buy;
        }
        location /sell {
          proxy_pass http://buysell:3001/sell;
        }
        location /send {
          proxy_pass http://sendreceive:3002/send;
        }
      }
    }
