apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
  - port: 3306
    targetPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: account
spec:
  type: LoadBalancer
  selector:
    app: account
  ports:
  - port: 8080
    targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: buysell
spec:
  type: LoadBalancer
  selector:
    app: buysell
  ports:
  - port: 3001
    targetPort: 3001

---
apiVersion: v1
kind: Service
metadata:
  name: sendreceive
spec:
  type: LoadBalancer
  selector:
    app: sendreceive
  ports:
  - port: 3002
    targetPort: 3002

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/network-load-balancer-address-type: internet-facing
spec:
  type: LoadBalancer
  externalIPs:
  - 54.175.15.144
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
